<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Flash Sale Hari Ini — Display Toko</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Inter:wght@500;700;800;900&display=swap');

  :root{
    --navy-deep: #0a1642;
    --navy-mid: #123a7a;
    --sky: #3b9eef;
    --sky-light: #7fc4ff;
    --pink-hot: #ff2f6e;
    --pink-deep: #c81155;
    --pink-glow: #ff6f9c;
    --yellow: #ffd200;
    --yellow-deep: #ffb703;
    --white: #ffffff;
    --ink: #0a1642;
    --panel: #eef6ff;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html, body{
    width:100%; height:100%;
    overflow:hidden;
    font-family:'Inter', sans-serif;
    background:
      radial-gradient(ellipse at top left, rgba(127,196,255,0.25), transparent 55%),
      linear-gradient(160deg, var(--navy-deep) 0%, var(--navy-mid) 38%, var(--sky) 100%);
    color: var(--white);
  }

  .stage{
    width:100vw; height:100vh;
    padding: 2.2vh 2.4vw;
    display:flex; flex-direction:column;
    gap: 1.8vh;
  }

  /* ---------- HEADER ---------- */
  .header{
    display:flex; align-items:center; justify-content:space-between;
  }
  .brand{
    display:flex; align-items:center; gap:1vw;
  }
  .brand-icon{
    width:5.4vh; height:5.4vh;
    background: linear-gradient(145deg, var(--pink-hot), var(--pink-deep));
    border-radius: 22%;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.35), 0 6px 18px rgba(200,17,85,0.55);
  }
  .brand-icon svg{ width:60%; height:60%; }
  .brand-title{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size: 3.6vh;
    line-height:1;
    letter-spacing: 0.5px;
    text-shadow: 0 3px 0 rgba(10,22,66,0.4);
  }
  .brand-title span{ color: var(--yellow); }
  .brand-sub{
    font-size: 1.5vh;
    font-weight:700;
    opacity:0.85;
    letter-spacing:0.5px;
    margin-top:0.3vh;
  }

  .clock-box{
    text-align:right;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 14px;
    padding: 0.9vh 1.4vw;
    backdrop-filter: blur(6px);
  }
  .clock-time{
    font-family:'Inter', sans-serif;
    font-weight:900;
    font-size: 2.6vh;
    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
  }
  .clock-date{
    font-size: 1.3vh;
    font-weight:700;
    opacity:0.8;
    text-transform: capitalize;
  }

  /* ---------- MAIN GRID ---------- */
  .main{
    flex: 1;
    display:grid;
    grid-template-columns: 1.65fr 1fr;
    gap: 1.8vw;
    min-height:0;
  }

  /* ---- HERO (left) ---- */
  .hero{
    position:relative;
    border-radius: 26px;
    padding: 2.4vh 2.4vw;
    display:flex; flex-direction:column;
    justify-content:space-between;
    overflow:hidden;
    border: 3px solid rgba(255,255,255,0.5);
  }
  .hero.active{
    background: radial-gradient(ellipse at 20% 0%, rgba(255,255,255,0.18), transparent 55%), linear-gradient(135deg, var(--pink-hot), var(--pink-deep) 75%);
    box-shadow: 0 0 60px rgba(255,47,110,0.55), inset 0 0 0 1px rgba(255,255,255,0.2);
    animation: pulseGlow 2.2s ease-in-out infinite;
  }
  .hero.idle{
    background: radial-gradient(ellipse at 20% 0%, rgba(255,255,255,0.15), transparent 55%), linear-gradient(135deg, var(--sky), var(--navy-mid) 80%);
    box-shadow: 0 0 45px rgba(59,158,239,0.45);
  }
  @keyframes pulseGlow{
    0%,100%{ box-shadow: 0 0 45px rgba(255,47,110,0.5); }
    50%{ box-shadow: 0 0 75px rgba(255,47,110,0.85); }
  }

  .hero-tag{
    align-self:flex-start;
    display:flex; align-items:center; gap:0.6vw;
    background: var(--yellow);
    color: var(--pink-deep);
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size: 1.9vh;
    padding: 0.7vh 1.4vw;
    border-radius: 999px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.15);
  }
  .hero-tag.blue{ background: var(--white); color: var(--sky); }
  .bolt{ width:1.6vh; height:1.6vh; }

  .hero-window{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size: 5.6vh;
    color: var(--yellow);
    letter-spacing: 1px;
    text-shadow: 0 4px 0 rgba(0,0,0,0.2);
    margin-top: 1.2vh;
  }
  .hero.idle .hero-window{ color: var(--white); }

  .hero-brands{
    display:flex; align-items:center; gap: 2.2vw;
    margin-top: 1.4vh;
  }
  .brand-chip{
    display:flex; flex-direction:column; align-items:center; gap:0.8vh;
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 16px;
    padding: 1.4vh 1.6vw;
    min-width: 11vw;
  }
  .brand-name{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size: 2.2vh;
    white-space:nowrap;
  }
  .brand-disc{
    background: var(--yellow);
    color: var(--pink-deep);
    font-weight:900;
    font-size: 2.4vh;
    padding: 0.3vh 1.1vw;
    border-radius: 8px;
  }
  .hero.idle .brand-disc{ color: var(--sky); }

  .countdown-block{
    margin-top: 1.6vh;
  }
  .countdown-label{
    font-size: 1.6vh;
    font-weight:800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.9;
    margin-bottom: 0.8vh;
  }
  .countdown-digits{
    display:flex; gap: 1vw;
  }
  .digit-box{
    background: rgba(10,22,66,0.35);
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 14px;
    padding: 1vh 1.3vw;
    text-align:center;
    min-width: 8.5vh;
  }
  .digit-num{
    font-family:'Inter', sans-serif;
    font-weight:900;
    font-size: 5.4vh;
    line-height:1;
    font-variant-numeric: tabular-nums;
  }
  .digit-cap{
    font-size: 1.2vh;
    font-weight:800;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.85;
    margin-top:0.4vh;
  }
  .digit-sep{
    font-size: 5vh; font-weight:900; align-self:center; opacity:0.7;
  }

  .hero-urgency{
    margin-top: 1.4vh;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size: 1.9vh;
  }
  .hero-urgency b{ color: var(--yellow); }
  .hero.idle .hero-urgency b{ color: var(--yellow); }

  /* ---- SIDE PANEL (Coming Soon) ---- */
  .side{
    background: var(--panel);
    border-radius: 26px;
    padding: 2vh 1.6vw;
    display:flex; flex-direction:column;
    color: var(--ink);
    border: 3px solid rgba(255,255,255,0.6);
  }
  .side-head{
    display:flex; align-items:center; gap:0.7vw;
    background: linear-gradient(90deg, var(--sky), var(--navy-mid));
    color:var(--white);
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size: 2.1vh;
    padding: 1.1vh 1.2vw;
    border-radius: 14px;
    margin-bottom: 1.6vh;
  }
  .side-head svg{ width:2.2vh; height:2.2vh; }

  .side-window{
    font-family:'Inter', sans-serif;
    font-weight:900;
    font-size: 3.2vh;
    color: var(--navy-mid);
    margin-bottom: 1.4vh;
    letter-spacing: 0.5px;
  }

  .side-list{ display:flex; flex-direction:column; gap: 1.2vh; flex:1; }
  .side-item{
    display:flex; align-items:center; justify-content:space-between;
    background: var(--white);
    border-radius: 14px;
    padding: 1.4vh 1.2vw;
    box-shadow: 0 3px 10px rgba(10,22,66,0.08);
    border: 1px solid rgba(10,22,66,0.06);
  }
  .side-item .name{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size: 2vh;
    color: var(--ink);
  }
  .side-item .disc{
    background: var(--navy-mid);
    color: var(--white);
    font-weight:900;
    font-size: 1.9vh;
    padding: 0.5vh 1vw;
    border-radius: 8px;
  }

  .side-foot{
    margin-top: 1.4vh;
    font-size: 1.5vh;
    font-weight:700;
    color: var(--pink-deep);
    display:flex; align-items:center; gap:0.5vw;
  }

  /* ---------- SCHEDULE STRIP ---------- */
  .schedule{
    background: rgba(255,255,255,0.94);
    border-radius: 22px;
    padding: 1.6vh 1.6vw;
    display:flex; align-items:stretch; gap: 1vw;
    color: var(--ink);
  }
  .schedule-title{
    display:flex; flex-direction:column; align-items:flex-start; justify-content:center;
    gap:0.4vh;
    min-width: 12vw;
    border-right: 2px dashed rgba(10,22,66,0.15);
    padding-right: 1vw;
  }
  .schedule-title .lbl{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size: 2vh;
    color: var(--navy-mid);
  }
  .schedule-title .sub{
    font-size: 1.3vh;
    font-weight:700;
    opacity:0.6;
  }

  .sched-items{ flex:1; display:flex; gap: 1vw; }
  .sched-item{
    flex:1;
    position:relative;
    border-radius: 16px;
    padding: 1.2vh 1.1vw;
    display:flex; flex-direction:column; gap:0.5vh;
    border: 2px solid transparent;
    background: #f3f7ff;
  }
  .sched-item .num{
    position:absolute; top:-1.1vh; left:0.9vw;
    width: 2.6vh; height:2.6vh;
    border-radius:50%;
    background: var(--navy-mid);
    color:var(--white);
    font-weight:900; font-size: 1.4vh;
    display:flex; align-items:center; justify-content:center;
  }
  .sched-item .time{
    font-weight:800; font-size:1.6vh; color: var(--navy-mid);
    margin-top: 0.6vh;
  }
  .sched-item .brands{
    font-family:'Baloo 2', sans-serif;
    font-weight:700; font-size: 1.9vh; color: var(--ink);
  }
  .sched-item .disc{
    font-weight:900; font-size:1.6vh; color: var(--pink-deep);
  }
  .sched-item.done{ opacity:0.5; }
  .sched-item.now{
    background: linear-gradient(135deg, #fff0f5, #ffe3ec);
    border-color: var(--pink-hot);
    box-shadow: 0 0 18px rgba(255,47,110,0.35);
  }
  .sched-item.now .num{ background: var(--pink-hot); }
  .sched-item.next .badge{
    position:absolute; top:-1.1vh; right:0.7vw;
    background: var(--yellow); color:var(--pink-deep);
    font-size: 1.1vh; font-weight:800;
    padding: 0.3vh 0.8vw; border-radius: 999px;
  }
</style>
</head>
<body>
<div class="stage">

  <div class="header">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M6 8h12l-1 12H7L6 8Z" stroke="white" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 8V6a3 3 0 0 1 6 0v2" stroke="white" stroke-width="1.8"/><path d="M13.5 3.5 10 10h2.5L11 14.5 15 8h-2.5l1-4.5Z" fill="#FFD200"/></svg>
      </div>
      <div>
        <div class="brand-title">FLASH SALE <span>HARI INI</span></div>
        <div class="brand-sub">BELANJA SEKARANG SEBELUM WAKTUNYA HABIS!</div>
      </div>
    </div>
    <div class="clock-box">
      <div class="clock-time" id="clock">--:--:--</div>
      <div class="clock-date" id="dateNow">-</div>
    </div>
  </div>

  <div class="main">
    <div class="hero" id="hero">
      <div>
        <div class="hero-tag" id="heroTag">SEDANG BERLANGSUNG</div>
        <div class="hero-window" id="heroWindow">15:00 - 17:00</div>
        <div class="hero-brands" id="heroBrands"></div>
      </div>

      <div>
        <div class="countdown-block">
          <div class="countdown-label" id="countdownLabel">WAKTU TERBATAS — PROMO BERAKHIR DALAM</div>
          <div class="countdown-digits" id="countdownDigits"></div>
        </div>
        <div class="hero-urgency" id="heroUrgency">Jangan sampai <b>kelewatan!</b></div>
      </div>
    </div>

    <div class="side">
      <div class="side-head">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="white" stroke-width="1.8"/><path d="M12 7v5l3.5 2" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span id="sideTitle">COMING SOON</span>
      </div>
      <div class="side-window" id="sideWindow">19:00 - 21:00</div>
      <div class="side-list" id="sideList"></div>
      <div class="side-foot">⚡ Siapkan keranjangmu sekarang!</div>
    </div>
  </div>

  <div class="schedule">
    <div class="schedule-title">
      <div class="lbl">📅 Jadwal Hari Ini</div>
      <div class="sub">3 sesi flash sale</div>
    </div>
    <div class="sched-items" id="schedItems"></div>
  </div>

</div>

<script>
const SLOTS = [
  { start:[10,0], end:[12,0], items:[{name:'Skintific', disc:'35% Semua Produk'}] },
  { start:[15,0], end:[17,0], items:[{name:"L'Oréal", disc:'35%'}, {name:'Garnier', disc:'35%'}] },
  { start:[19,0], end:[21,0], items:[{name:'Maybelline', disc:'35%'}, {name:'Glad2Glow', disc:'35%'}] },
];

function pad(n){ return String(n).padStart(2,'0'); }
function timeLabel(t){ return pad(t[0]) + ':' + pad(t[1]); }
function toDate(base, hm){
  const d = new Date(base);
  d.setHours(hm[0], hm[1], 0, 0);
  return d;
}
function fmtBrands(items){
  return items.map(i => i.name).join(' & ');
}

function render(){
  const now = new Date();
  document.getElementById('clock').textContent =
    pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
  document.getElementById('dateNow').textContent =
    now.toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long' });

  const slotsWithTimes = SLOTS.map(s => ({
    ...s,
    startDate: toDate(now, s.start),
    endDate: toDate(now, s.end)
  }));

  let activeIdx = slotsWithTimes.findIndex(s => now >= s.startDate && now < s.endDate);
  let nextIdx = slotsWithTimes.findIndex(s => now < s.startDate);

  const hero = document.getElementById('hero');
  const heroTag = document.getElementById('heroTag');
  const heroWindow = document.getElementById('heroWindow');
  const heroBrands = document.getElementById('heroBrands');
  const countdownLabel = document.getElementById('countdownLabel');
  const countdownDigits = document.getElementById('countdownDigits');
  const heroUrgency = document.getElementById('heroUrgency');

  let target, isActive;

  if (activeIdx !== -1) {
    const s = slotsWithTimes[activeIdx];
    isActive = true;
    target = s.endDate;
    hero.className = 'hero active';
    heroTag.className = 'hero-tag';
    heroTag.textContent = '⚡ SEDANG BERLANGSUNG';
    heroWindow.textContent = timeLabel(s.start) + ' - ' + timeLabel(s.end);
    heroBrands.innerHTML = s.items.map(i =>
      `<div class="brand-chip"><div class="brand-name">${i.name}</div><div class="brand-disc">DISKON ${i.disc.includes('%') ? i.disc : i.disc}</div></div>`
    ).join('');
    countdownLabel.textContent = 'WAKTU TERBATAS — PROMO BERAKHIR DALAM';
    heroUrgency.innerHTML = 'Jangan sampai <b>kelewatan!</b> Diskon hilang begitu waktu habis.';
  } else if (nextIdx !== -1) {
    const s = slotsWithTimes[nextIdx];
    isActive = false;
    target = s.startDate;
    hero.className = 'hero idle';
    heroTag.className = 'hero-tag blue';
    heroTag.textContent = '🕒 SEGERA DIMULAI';
    heroWindow.textContent = timeLabel(s.start) + ' - ' + timeLabel(s.end);
    heroBrands.innerHTML = s.items.map(i =>
      `<div class="brand-chip"><div class="brand-name">${i.name}</div><div class="brand-disc">DISKON ${i.disc}</div></div>`
    ).join('');
    countdownLabel.textContent = 'PROMO DIMULAI DALAM';
    heroUrgency.innerHTML = 'Siap-siap, <b>gercep checkout!</b> Diskon akan langsung tersedia.';
  } else {
    isActive = false;
    hero.className = 'hero idle';
    heroTag.className = 'hero-tag blue';
    heroTag.textContent = '✅ SELESAI HARI INI';
    heroWindow.textContent = 'Sampai jumpa besok';
    heroBrands.innerHTML = '';
    countdownLabel.textContent = 'FLASH SALE BERIKUTNYA';
    countdownDigits.innerHTML = '<div class="digit-box"><div class="digit-num">--</div><div class="digit-cap">Besok</div></div>';
    heroUrgency.innerHTML = 'Terima kasih sudah belanja! <b>Sampai jumpa besok.</b>';
  }

  if (target) {
    let diff = Math.max(0, target - now);
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const sec = Math.floor((diff % 60000) / 1000);
    countdownDigits.innerHTML = `
      <div class="digit-box"><div class="digit-num">${pad(h)}</div><div class="digit-cap">Jam</div></div>
      <div class="digit-sep">:</div>
      <div class="digit-box"><div class="digit-num">${pad(m)}</div><div class="digit-cap">Menit</div></div>
      <div class="digit-sep">:</div>
      <div class="digit-box"><div class="digit-num">${pad(sec)}</div><div class="digit-cap">Detik</div></div>
    `;
  }

  // Side panel: show the slot AFTER the hero's focus (upcoming, non-immediate)
  const sideTitle = document.getElementById('sideTitle');
  const sideWindow = document.getElementById('sideWindow');
  const sideList = document.getElementById('sideList');

  let sideIdx = activeIdx !== -1 ? nextIdx : slotsWithTimes.findIndex((s,i) => i > nextIdx);
  if (activeIdx === -1 && nextIdx !== -1) {
    sideIdx = slotsWithTimes.findIndex((s,i) => i > nextIdx);
  }

  if (sideIdx !== -1 && sideIdx !== undefined && sideIdx > -1) {
    const s = slotsWithTimes[sideIdx];
    sideTitle.textContent = 'COMING SOON';
    sideWindow.textContent = timeLabel(s.start) + ' - ' + timeLabel(s.end);
    sideList.innerHTML = s.items.map(i =>
      `<div class="side-item"><div class="name">${i.name}</div><div class="disc">DISKON ${i.disc.split(' ')[0]}</div></div>`
    ).join('');
  } else {
    sideTitle.textContent = 'HARI INI';
    sideWindow.textContent = 'Semua sesi selesai';
    sideList.innerHTML = '<div class="side-item"><div class="name">Nantikan besok</div><div class="disc">✨</div></div>';
  }

  // Schedule strip
  const schedItems = document.getElementById('schedItems');
  schedItems.innerHTML = slotsWithTimes.map((s, i) => {
    let cls = 'sched-item';
    let badge = '';
    if (now >= s.endDate) cls += ' done';
    else if (i === activeIdx) cls += ' now';
    else if (i === nextIdx) { cls += ' next'; badge = '<div class="badge">AKAN DATANG</div>'; }
    return `<div class="${cls}">
      <div class="num">${i+1}</div>
      ${badge}
      <div class="time">${timeLabel(s.start)} - ${timeLabel(s.end)}</div>
      <div class="brands">${fmtBrands(s.items)}</div>
      <div class="disc">DISKON ${s.items[0].disc.match(/\d+%/) ? s.items[0].disc.match(/\d+%/)[0] : s.items[0].disc}</div>
    </div>`;
  }).join('');
}

render();
setInterval(render, 1000);
</script>
</body>
</html>
