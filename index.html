<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#008cff" />
    <title>Flash Sale Hari Ini</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="tv-stage">
      <section class="poster" aria-label="Jadwal flash sale hari ini">
        <div class="sky sky-left"></div>
        <div class="sky sky-right"></div>
        <div class="speed speed-one"></div>
        <div class="speed speed-two"></div>
        <div class="spark spark-a">✦</div>
        <div class="spark spark-b">✦</div>
        <div class="spark spark-c">✦</div>

        <header class="hero">
          <div class="bag-logo" aria-hidden="true">
            <span class="bag-handle"></span>
            <span class="bag-bolt">⚡</span>
          </div>
          <div class="hero-copy">
            <h1><span>Flash Sale</span> <strong>Hari Ini</strong></h1>
            <div class="hero-ribbon">Jangan lewatkan promo terbatas hari ini!</div>
          </div>
          <div class="alarm-logo" aria-hidden="true">
            <span></span>
            <b>⚡</b>
          </div>
        </header>

        <section class="top-grid">
          <article class="active-card">
            <div class="live-badge">
              <span>⚡</span>
              <b id="activeBadge">Sedang Berlangsung</b>
            </div>

            <div class="active-content">
              <div class="active-left">
                <div id="activeTime" class="active-time">15:00 - 17:00</div>
                <div class="limited-pill"><span>◷</span> Waktu Terbatas</div>
                <p>Jangan sampai</p>
                <strong>kelewatan!</strong>
              </div>

              <div class="glow-divider"></div>

              <div id="activeBrands" class="active-brands"></div>
            </div>

            <div class="countdown-bar" aria-live="polite">
              <div class="count-icon">⏱</div>
              <div>
                <span id="countdownLabel">Berakhir dalam</span>
                <strong id="mainCountdown">00:00:00</strong>
              </div>
              <div class="chevron">›</div>
            </div>
          </article>

          <aside class="coming-card">
            <div class="coming-title"><span>◷</span> Coming Soon</div>
            <div id="nextTime" class="coming-time">19:00 - 21:00</div>
            <div id="nextBrands" class="coming-brands"></div>
            <p><span>⚡</span> Siapkan keranjangmu sekarang!</p>
          </aside>
        </section>

        <section class="schedule-wrap">
          <div class="schedule-title">
            <span class="calendar-icon">▦</span>
            <b>Jadwal Hari Ini</b>
          </div>
          <div id="scheduleList" class="schedule-list"></div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
